services:
  - type: web
    name: copmec-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    preDeployCommand: npx prisma db push --skip-generate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: copmec-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: URLENCODED_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 300
      - key: RATE_LIMIT_UPLOAD_MAX_REQUESTS
        value: 20
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: copmec-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    previews:
      generation: manual
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        sync: false

databases:
  - name: copmec-db
    plan: free
    region: oregon
    databaseName: copmec
    user: copmec
    postgresMajorVersion: "17"