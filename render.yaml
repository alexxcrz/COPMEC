services:
  - type: web
    name: copmec-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    preDeployCommand: npx prisma db push --skip-generate
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: copmec-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_NAME
        value: copmec_session
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_TTL_SECONDS
        value: 43200
      - key: SESSION_COOKIE_SAMESITE
        value: lax
      - key: PUBLIC_LOGIN_DIRECTORY_ENABLED
        value: false
      - key: MASTER_USERNAME
        value: Maestro
      - key: MASTER_PASSWORD
        sync: false
      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: URLENCODED_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 300
      - key: RATE_LIMIT_AUTH_MAX_REQUESTS
        value: 12
      - key: RATE_LIMIT_UPLOAD_MAX_REQUESTS
        value: 20
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: copmec-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    previews:
      generation: manual
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; media-src 'self' blob: https:; worker-src 'self' blob:; form-action 'self'
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_API_URL
        sync: false

databases:
  - name: copmec-db
    plan: free
    region: oregon
    databaseName: copmec
    user: copmec
    postgresMajorVersion: "17"