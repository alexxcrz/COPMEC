<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/copmec-favicon.svg?v=4" />
    <link rel="shortcut icon" href="/copmec-favicon.svg?v=4" />
    <link rel="apple-touch-icon" href="/copmec-favicon.svg" />
    <meta name="theme-color" content="#12352d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="COPMEC" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COPMEC</title>
    <style>
      #copmec-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #032121;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        transition: opacity 0.5s ease;
      }
      #copmec-splash.hidden { opacity: 0; pointer-events: none; }
      #copmec-splash-label {
        color: #f4d089;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="copmec-splash" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="sp-bg" x1="11" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#1f5c4f" />
            <stop offset="1" stop-color="#0d241f" />
          </linearGradient>
          <linearGradient id="sp-ring" x1="14" y1="12" x2="51" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#f4d089" />
            <stop offset="1" stop-color="#b9862f" />
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="29" fill="#091816" />
        <circle cx="32" cy="32" r="27" fill="url(#sp-bg)" />
        <circle cx="32" cy="32" r="24" fill="none" stroke="url(#sp-ring)" stroke-width="3.5" />
        <circle cx="32" cy="32" r="18" fill="#12352d" stroke="#f4d089" stroke-opacity="0.45" stroke-width="1.5" />
        <path d="M26 24.5C22.9624 24.5 20.5 26.9624 20.5 30V34C20.5 37.0376 22.9624 39.5 26 39.5H29.5" stroke="#f4d089" stroke-width="4" stroke-linecap="round" />
        <path d="M31 39V25L36 32L41 25V39" stroke="#7ce0bb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="45.5" cy="22.5" r="3" fill="#f3b14f" />
      </svg>
      <span id="copmec-splash-label">COPMEC</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.__copmecHideSplash = function () {
        var el = document.getElementById('copmec-splash');
        if (!el) return;
        el.classList.add('hidden');
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 550);
      };
      // Failsafe: remove splash after 4 seconds even if React doesn't call it
      setTimeout(window.__copmecHideSplash, 4000);
    </script>
  </body>
</html>
